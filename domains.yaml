# Domain Configurations for Consultancy Skill
# Defines the Maker/Validator/Aligner trio for each domain

meta:
  version: "5.0.1"
  description: "Universal trio configurations with platform adaptation"
  default_domain: "software"

# Platform Adaptation Tiers
# Different platforms have different verification capabilities
platform_tiers:
  tier_a_full_tools:
    name: "Full Tool Access"
    platforms: ["kimi-cli", "local-ai-with-tools"]
    capabilities:
      - actual_code_execution
      - file_system_access
      - test_runners
      - linters
      - simulators
    confidence_label: "HIGH - Verified with tools"
    user_action: "None - verification complete"
    
  tier_b_limited_tools:
    name: "Limited Tool Access"
    platforms: ["kimi-cli-restricted", "vscode-copilot"]
    capabilities:
      - static_analysis
      - partial_execution
      - file_reading
    confidence_label: "MEDIUM - Partial verification"
    user_action: "Run tests locally to confirm"
    
  tier_c_text_only:
    name: "Text-Only Platforms"
    platforms: ["chatgpt", "claude", "gemini", "deepseek"]
    capabilities:
      - code_review
      - logic_analysis
      - pattern_matching
      - syntax_checking
    confidence_label: "LOW - Simulated verification only"
    user_action: "⚠️ REQUIRED: Manually verify on real system before using"
    note: "This verification is simulated. Actual testing required."

domains:
  software:
    name: "Software Development"
    icon: "💻"
    keywords:
      - code
      - python
      - javascript
      - typescript
      - script
      - api
      - database
      - function
      - app
      - program
      - software
    file_extensions:
      - ".py"
      - ".js"
      - ".ts"
      - ".html"
      - ".css"
      - ".sql"
      - ".json"
      - ".yaml"
    
    roles:
      maker:
        name: "Coder"
        title: "Software Developer"
        mindset: "I write clean, working code that solves real problems"
        responsibilities:
          - Write complete, runnable code
          - Implement features per specification
          - Fix defects identified by Validator
          - Document code and usage
        tools:
          - "Python/JavaScript/TypeScript"
          - "Code editors/IDEs"
          - "Version control (git)"
        outputs:
          - "Source code files"
          - "Test files"
          - "Documentation"
          - "Configuration"
          
      validator:
        name: "Tester"
        title: "Quality Assurance Engineer"
        mindset: "I find what's broken before it reaches the user"
        responsibilities:
          - Verify code works as specified
          - Test edge cases and error conditions
          - Measure coverage and quality
          - Report specific, actionable defects
        tools:
          - "pytest / jest / testing frameworks"
          - "ruff / eslint / linters"
          - "Code execution environments"
          - "Coverage analysis"
        outputs:
          - "Verification report"
          - "Test results"
          - "Defect list"
          - "Coverage metrics"
          
      aligner:
        name: "Business Analyst"
        title: "Business Analyst"
        mindset: "I ensure we solve the right problem for the business"
        responsibilities:
          - Interview client to understand true need
          - Validate requirements are clear and testable
          - Ensure solution aligns with business goals
          - Flag scope creep and misalignment
        tools:
          - "Requirements analysis"
          - "User story definition"
          - "Acceptance criteria"
          - "Stakeholder communication"
        outputs:
          - "REQUIREMENTS.md"
          - "Acceptance criteria"
          - "Risk assessment"
          - "Alignment confirmation"
    
    verification_methods:
      syntax_check:
        name: "Syntax Validation"
        tool: "ruff / eslint"
        criteria: "Zero syntax errors"
        
      execution:
        name: "Code Execution"
        tool: "python / node"
        criteria: "Runs without crash"
        
      test_suite:
        name: "Test Suite"
        tool: "pytest / jest"
        criteria: ">80% tests pass"
        
      coverage:
        name: "Code Coverage"
        tool: "coverage.py / c8"
        criteria: ">80% line coverage"
        
    deliverable_format: "Code repository with tests and documentation"
    
    documentation_template: |
      ## Software Deliverable
      
      ### Code
      - Location: {path}
      - Language: {language}
      
      ### Tests
      - Pass rate: {pass}/{total}
      - Coverage: {coverage}%
      
      ### Usage
      ```bash
      {usage_instructions}
      ```

  manufacturing:
    name: "Manufacturing / 3D Printing"
    icon: "🏭"
    keywords:
      - "3d print"
      - cad
      - stl
      - part
      - component
      - manufacture
      - fabricate
      - prototype
      - mesh
      - dimension
    file_extensions:
      - ".stl"
      - ".step"
      - ".obj"
      - ".f3d"
      - ".3mf"
    
    roles:
      maker:
        name: "Designer"
        title: "CAD Designer"
        mindset: "I create functional, manufacturable designs"
        responsibilities:
          - Create 3D models and CAD files
          - Design for manufacturability
          - Specify materials and tolerances
          - Generate technical drawings
        tools:
          - "Fusion 360 / SolidWorks / Blender"
          - "CAD modeling"
          - "Technical drawing"
        outputs:
          - "3D model files (STL, STEP)"
          - "Technical drawings"
          - "Material specifications"
          - "Manufacturing notes"
          
      validator:
        name: "Engineer"
        title: "Manufacturing Engineer"
        mindset: "I validate structural integrity and manufacturability"
        responsibilities:
          - Verify mesh integrity (watertight, manifold)
          - Run structural simulations
          - Assess printability and supports needed
          - Calculate cost and time estimates
        tools:
          - "Mesh analysis (Netfabb, Meshmixer)"
          - "FEA simulation"
          - "Slicer software (Cura, PrusaSlicer)"
          - "Cost estimation"
        outputs:
          - "Validation report"
          - "Simulation results"
          - "Printability assessment"
          - "Cost estimate"
          
      aligner:
        name: "Product Manager"
        title: "Product Manager"
        mindset: "I ensure the design meets the product requirements"
        responsibilities:
          - Validate design against specifications
          - Confirm fit, form, and function
          - Assess manufacturing constraints
          - Verify timeline and budget alignment
        tools:
          - "Product specifications"
          - "Constraint analysis"
          - "Requirement traceability"
        outputs:
          - "Design specification validation"
          - "Requirement coverage matrix"
          - "Risk register"
    
    verification_methods:
      mesh_integrity:
        name: "Mesh Integrity Check"
        tool: "Netfabb / Meshmixer"
        criteria: "Watertight, manifold, no non-manifold edges"
        
      structural_simulation:
        name: "Structural Analysis"
        tool: "FEA simulation"
        criteria: "Safety factor > 2x under load"
        
      printability:
        name: "Printability Assessment"
        tool: "Cura / PrusaSlicer"
        criteria: "No unprintable features, supports identified"
        
      cost_analysis:
        name: "Cost Estimation"
        tool: "Material calculators"
        criteria: "Within budget"
        
    deliverable_format: "CAD package with validation report and manufacturing specs"
    
    documentation_template: |
      ## Manufacturing Deliverable
      
      ### 3D Model
      - Format: {format}
      - Dimensions: {dimensions}
      - Volume: {volume} cm³
      
      ### Validation
      - Mesh: {status}
      - Structural safety factor: {factor}x
      - Printability: {status}
      
      ### Manufacturing
      - Material: {material}
      - Estimated cost: ${cost}
      - Print time: {time}
      - Supports required: {yes/no}

  fashion:
    name: "Fashion / Bridal Design"
    icon: "👗"
    keywords:
      - dress
      - wedding
      - fashion
      - garment
      - fabric
      - sewing
      - pattern
      - bridal
      - gown
      - couture
    file_extensions: []
    
    roles:
      maker:
        name: "Designer"
        title: "Fashion Designer"
        mindset: "I create beautiful, wearable designs that express vision"
        responsibilities:
          - Create design sketches and illustrations
          - Develop patterns and technical specs
          - Select fabrics and materials
          - Design construction details
        tools:
          - "Sketching (digital/traditional)"
          - "Pattern making"
          - "Draping"
          - "Fabric selection"
        outputs:
          - "Design sketches"
          - "Pattern files"
          - "Fabric specifications"
          - "Construction notes"
          
      validator:
        name: "Fitter"
        title: "Master Fitter / Seamstress"
        mindset: "I ensure it fits perfectly and can be beautifully constructed"
        responsibilities:
          - Create and fit mockups (toiles)
          - Assess construction feasibility
          - Identify fitting issues
          - Specify alterations needed
        tools:
          - "Mockup construction"
          - "Fitting sessions"
          - "Pattern adjustment"
          - "Construction techniques"
        outputs:
          - "Fit assessment"
          - "Mockup photos/notes"
          - "Alteration list"
          - "Construction plan"
          
      aligner:
        name: "Bridal Consultant"
        title: "Bridal Consultant"
        mindset: "I ensure the dress matches the bride's dream and vision"
        responsibilities:
          - Understand bride's vision and preferences
          - Validate design aligns with wedding theme
          - Confirm practical constraints (budget, timeline)
          - Ensure bride loves the design
        tools:
          - "Vision boards"
          - "Style consultation"
          - "Preference elicitation"
          - "Fitting coordination"
        outputs:
          - "Vision alignment confirmation"
          - "Style validation"
          - "Bride approval"
          - "Timeline coordination"
    
    verification_methods:
      mockup_fitting:
        name: "Mockup Fitting"
        tool: "Physical toile/muslin"
        criteria: "Fits measurements ±0.5 inch"
        
      construction_feasibility:
        name: "Construction Review"
        tool: "Pattern analysis"
        criteria: "All seams and techniques are feasible"
        
      material_behavior:
        name: "Fabric Testing"
        tool: "Swatch testing"
        criteria: "Drape, sheen, movement as envisioned"
        
      client_approval:
        name: "Bride Approval"
        tool: "Design presentation"
        criteria: "Bride confirms "I love it""
        
    deliverable_format: "Design package with sketches, patterns, and construction plan"
    
    documentation_template: |
      ## Fashion Deliverable
      
      ### Design
      - Style: {description}
      - Sketches: {location}
      - Inspiration: {board}
      
      ### Pattern
      - Size: {measurements}
      - Pieces: {count}
      - Fabric required: {yards}
      
      ### Validation
      - Mockup fit: {status}
      - Construction: {feasible}
      - Bride approval: {status}
      
      ### Construction
      - Difficulty: {level}
      - Time estimate: {hours}
      - Key techniques: {list}

  aerospace:
