# ============================================================================
# ADD YOUR PERSONAL PREFERENCES BELOW
# ============================================================================
# The AI will learn these over time and apply them automatically.
#
# Preference Categories:
# - decision_criteria    : How you make choices (quality vs speed, etc.)
# - completion_standards : What "done" means to you
# - communication_style  : How you prefer information presented
# - communication_protocol: Special rules for interaction
# - domain_defaults      : Preferred defaults for specific domains
# - safety_tolerance     : Your comfort level with automated actions
# - verification_level   : How much proof you want

