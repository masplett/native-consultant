# User Preferences Template for Consultancy Skill
# Copy this file to your user config directory during installation
# Location: %USERPROFILE%\.config\agents\skills\consultancy\user-preferences.yaml
#
# This file captures learned preferences from your interactions with the AI.
# The AI will read this to personalize its behavior for you.

user:
  name: "{{USER_NAME}}"  # Replace with your name
  preference_learning: "enabled"

# ============================================================================
